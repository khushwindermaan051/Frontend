<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jivo Data Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'DM Sans', sans-serif; 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 600px;
    }
    .logo {
      width: 100px;
      height: 100px;
      background: #3ECF8E;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      margin: 0 auto 24px;
      box-shadow: 0 20px 60px rgba(62, 207, 142, 0.3);
    }
    h1 {
      color: #fff;
      font-size: 42px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: rgba(255,255,255,0.6);
      font-size: 18px;
      margin-bottom: 48px;
    }
    .buttons {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 48px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      text-decoration: none;
      color: #fff;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      min-width: 220px;
    }
    .btn:hover {
      background: rgba(62, 207, 142, 0.2);
      border-color: #3ECF8E;
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .btn .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .btn .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .btn .desc {
      font-size: 14px;
      opacity: 0.7;
    }
    .note {
      margin-top: 48px;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
    .note code {
      background: rgba(255,255,255,0.1);
      padding: 2px 8px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🛢️</div>
    <h1>Jivo Data Hub</h1>
    <p class="subtitle">Platform Data Entry Tools</p>
    
    <div class="buttons">
      <a href="inventory.html" class="btn">
        <span class="icon">📦</span>
        <span class="title">Inventory</span>
      </a>

      <a href="secondary.html" class="btn">
        <span class="icon">🛒</span>
        <span class="title">Secondary</span>
      </a> 
    </div>
    
   
  </div>
</body>
</html>
